[workspace]
authors = ["Mythenox <aandrews0601@gmail.com>"]
channels = ["conda-forge"]
name = "manga_to_anki"
platforms = [{platform = "linux-64", cuda = "13.3"},
]
version = "0.1.0"

[tasks]
word = "python3 word.py"

[dependencies]
scipy = ">=1.18.0,<2"
matplotlib = ">=3.11.0,<4"
scikit-image = ">=0.26.0,<0.27"
torchvision = ">=0.27.1,<0.28"
python = "3.12.*"
numpy = ">=2.5.0,<3"
pytorch-gpu = ">=2.12.1,<3"

[pypi-dependencies]
anki = ">=24.11, <25"
opencv-python = ">=4.13.0.92, <5"
manga-ocr = ">=0.1.14, <0.2"
sudachipy = ">=0.6.11, <0.7"
sudachidict-core = ">=20260428, <20260429"
